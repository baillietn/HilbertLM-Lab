<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>HilbertLM Chat</title>
    <link rel="icon" type="image/png" href="../figures/icon.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --page-gradient: linear-gradient(135deg, #4158a8 0%, #51357a 100%);
            --surface: #ffffff;
            --surface-soft: #f8f9fa;
            --text-main: #202124;
            --text-muted: #5f6368;
            --border-soft: #e0e0e0;
            --border-card: #e8eaed;
            --bubble-user: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bubble-user-text: #ffffff;
            --bubble-assistant-avatar: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bubble-assistant: #f8f9fa;
            --bubble-assistant-text: #202124;
            --inline-code-bg: rgba(0, 0, 0, 0.05);
            --input-bg: #ffffff;
            --input-text: #202124;
            --input-border: #e0e0e0;
            --send-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --stop-bg: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            --status-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--page-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 850px;
            height: 90vh;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: var(--page-gradient);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .hero-logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .status {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
            color: var(--status-color);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 15px;
            max-width: 85%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .message.user .message-avatar {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            font-weight: bold;
            border: none;
        }

        .message.assistant .message-avatar {
            background: var(--surface);
        }

        .message-content {
            background: var(--surface-soft);
            padding: 14px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-top-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--bubble-assistant);
            color: var(--bubble-assistant-text);
            border: 1px solid var(--border-card);
            border-top-left-radius: 4px;
        }

        .message-content p {
            margin-bottom: 10px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content pre {
            background: #282c34;
            color: #abb2bf;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            overflow-x: auto;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
        }

        .message-content code {
            font-family: 'Fira Code', 'Consolas', monospace;
            background: var(--inline-code-bg);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .message-content pre code {
            background: transparent;
            padding: 0;
        }

        .message-content ul,
        .message-content ol {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .chat-input-container {
            padding: 20px;
            background: var(--surface);
            border-top: 1px solid var(--border-soft);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--input-border);
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background: var(--input-bg);
            color: var(--input-text);
        }

        #user-input:focus {
            border-color: #667eea;
        }

        #send-button {
            background: var(--send-bg);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        #send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .blinking-cursor::after {
            content: '▋';
            animation: blink 1s step-end infinite;
            color: #764ba2;
        }

        .chat-header {
            background: var(--page-gradient);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .home-button {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.1);
        }

        .home-button svg {
            width: 20px;
            height: 20px;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .clear-button {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-button:hover {
            background: rgba(255, 100, 100, 0.3);
            transform: translateY(-50%) scale(1.1);
        }

        .clear-button:active {
            transform: translateY(-50%) scale(0.95);
        }

        .clear-button svg {
            width: 20px;
            height: 20px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateY(-50%) translateX(0);
            }

            25% {
                transform: translateY(-50%) translateX(-5px);
            }

            75% {
                transform: translateY(-50%) translateX(5px);
            }
        }

        .clear-button.clearing {
            animation: shake 0.3s ease;
            background: rgba(255, 100, 100, 0.5);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-gradient: linear-gradient(135deg, #0f1b2e 0%, #261a3d 100%);
                --surface: #101724;
                --surface-soft: #0d1522;
                --text-main: #e5e7eb;
                --text-muted: #a4afc0;
                --border-soft: #27364e;
                --border-card: #26334b;
                --bubble-user: linear-gradient(135deg, #2d3f7a 0%, #3f2a63 100%);
                --bubble-user-text: #f8fafc;
                --bubble-assistant-avatar: linear-gradient(135deg, #7a3f87 0%, #6f2d47 100%);
                --bubble-assistant: #111a2b;
                --bubble-assistant-text: #dde5f3;
                --inline-code-bg: rgba(255, 255, 255, 0.08);
                --input-bg: #0d1522;
                --input-text: #e5e7eb;
                --input-border: #30405b;
                --send-bg: linear-gradient(135deg, #2d3f7a 0%, #3f2a63 100%);
                --stop-bg: linear-gradient(135deg, #8d2e4e 0%, #6f3b7f 100%);
                --status-color: #dbe4f4;
            }

            body {
                color: var(--text-main);
            }

            .message-content pre {
                background: #0a1220;
                color: #dce6f7;
            }

            .blinking-cursor::after {
                color: #bba3ff;
            }
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-content">
                <a href="../index.html" class="home-button" title="Back to documentation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
                <h1><img src="../figures/icon.png" alt="HilbertLM logo" class="hero-logo">HilbertLM</h1>
                <button class="clear-button" id="clear-button" title="Clear conversation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
            <div class="status" id="status">Connected to Hugging Face Cloud ☁️</div>
        </div>

        <div class="chat-messages" id="chat-messages">
        </div>

        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" id="user-input" placeholder="Ask me in English for code or an equation...">
                <button id="send-button">Send</button>
            </div>
        </div>
    </div>

    <script>
        marked.setOptions({
            highlight: function (code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            breaks: true
        });

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const clearButton = document.getElementById('clear-button');
        const statusEl = document.getElementById('status');

        const API_URL = "https://baillietn-hilbertlm-space.hf.space/chat";

        let conversationHistory = [];

        let currentAbortController = null;
        let isGenerating = false;
        let lastUserMessageDiv = null;
        let lastAssistantMessageDiv = null;

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            if (role === 'user') {
                avatar.textContent = '👤';
            } else {
                const avatarImg = document.createElement('img');
                avatarImg.src = '../figures/icon.png';
                avatarImg.alt = 'Assistant avatar';
                avatar.appendChild(avatarImg);
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (content === '...') {
                contentDiv.classList.add('blinking-cursor');
            } else {
                contentDiv.innerHTML = marked.parse(content);
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            return { messageDiv, contentDiv };
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            isGenerating = true;
            sendButton.textContent = 'Stop';
            sendButton.style.background = 'var(--stop-bg)';
            userInput.disabled = true;

            const userNodes = addMessage('user', message);
            lastUserMessageDiv = userNodes.messageDiv;
            userInput.value = '';

            conversationHistory.push({ role: "user", content: message });

            const assistantNodes = addMessage('assistant', '...');
            lastAssistantMessageDiv = assistantNodes.messageDiv;
            const responseContentDiv = assistantNodes.contentDiv;

            statusEl.textContent = 'Generating...';

            currentAbortController = new AbortController();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Sending only the 3 last messages...
                    body: JSON.stringify({ messages: conversationHistory.slice(-3) }),
                    signal: currentAbortController.signal
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                responseContentDiv.classList.remove('blinking-cursor');

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;

                    let mathBlocks = [];

                    let protectedText = fullText.replace(/\$\$([\s\S]*?)\$\$/g, function (match) {
                        let index = mathBlocks.length;
                        mathBlocks.push(match);
                        return `MATHBLOCKPLACEHOLDER${index}END`;
                    });

                    let parsedHtml = marked.parse(protectedText);

                    mathBlocks.forEach((block, index) => {
                        parsedHtml = parsedHtml.replace(`MATHBLOCKPLACEHOLDER${index}END`, block);
                    });

                    responseContentDiv.innerHTML = parsedHtml;

                    try {
                        renderMathInElement(responseContentDiv, {
                            delimiters: [
                                { left: '$$', right: '$$', display: true },
                                { left: '$', right: '$', display: false },
                                { left: '\\(', right: '\\)', display: false },
                                { left: '\\[', right: '\\]', display: true }
                            ],
                            throwOnError: false
                        });
                    } catch (e) {
                        console.error("Erreur de rendu KaTeX :", e);
                    }

                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }

                conversationHistory.push({ role: "assistant", content: fullText });
                statusEl.textContent = 'Connected to Hugging Face Cloud ☁️';

            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Chatbot response was aborted...');

                    if (lastUserMessageDiv) lastUserMessageDiv.remove();
                    if (lastAssistantMessageDiv) lastAssistantMessageDiv.remove();

                    conversationHistory.pop();

                    userInput.value = message;

                    statusEl.textContent = 'Generation stopped.';
                } else {
                    console.error('API Error:', error);
                    responseContentDiv.classList.remove('blinking-cursor');
                    responseContentDiv.textContent = 'Sorry, an error occurred.';
                    statusEl.textContent = 'Connection error.';
                    conversationHistory.pop();
                }
            } finally {
                isGenerating = false;
                sendButton.textContent = 'Send';
                sendButton.style.background = '';
                userInput.disabled = false;
                userInput.focus();
                currentAbortController = null;
            }
        }

        function clearConversation() {
            conversationHistory = [];

            chatMessages.innerHTML = '';

            clearButton.classList.add('clearing');
            setTimeout(() => {
                clearButton.classList.remove('clearing');
            }, 300);

            statusEl.textContent = '🗑️ Conversation cleared';
            setTimeout(() => {
                statusEl.textContent = 'Connected to Hugging Face Cloud ☁️';
            }, 2000);

            console.log('Conversation history cleared');
        }

        clearButton.addEventListener('click', () => {
            if (conversationHistory.length === 0) {
                statusEl.textContent = 'No conversation to clear';
                setTimeout(() => {
                    statusEl.textContent = 'Connected to Hugging Face Cloud ☁️';
                }, 1500);
                return;
            }

            if (isGenerating) {
                if (confirm('A message is being generated. Clear anyway?')) {
                    if (currentAbortController) {
                        currentAbortController.abort();
                    }
                    clearConversation();
                }
            } else {
                if (conversationHistory.length > 4) {
                    if (confirm(`Clear ${conversationHistory.length} messages?`)) {
                        clearConversation();
                    }
                } else {
                    clearConversation();
                }
            }
        });

        sendButton.addEventListener('click', () => {
            if (isGenerating && currentAbortController) {
                currentAbortController.abort();
            } else {
                handleSend();
            }
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isGenerating) handleSend();
        });

        userInput.focus();
    </script>
</body>

</html>
